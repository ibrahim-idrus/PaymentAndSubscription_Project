name = "webhook-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8790

[vars]
XENDIT_WEBHOOK_TOKEN = "uozG8Rw58BoH1BmqBJwU2FNnmymIHnpFccpL0ZunOQCoE77m"
# Secrets: wrangler secret put DATABASE_URL

[[queues.consumers]]
queue = "webhook-jobs"
max_batch_size = 20
max_batch_timeout = 15
max_retries = 3

[[queues.producers]]
queue = "payment-jobs"
binding = "PAYMENT_QUEUE"

[[queues.producers]]
queue = "subscription-jobs"
binding = "SUBSCRIPTION_QUEUE"

[[queues.producers]]
queue = "notification-jobs"
binding = "NOTIFICATION_QUEUE"
