name = "webhook-worker"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
# Secrets: wrangler secret put DATABASE_URL

[[queues.consumers]]
queue = "webhook-jobs"
max_batch_size = 20
max_batch_timeout = 15
max_retries = 3

[[queues.producers]]
queue = "payment-jobs"
binding = "PAYMENT_QUEUE"

[[queues.producers]]
queue = "subscription-jobs"
binding = "SUBSCRIPTION_QUEUE"

[[queues.producers]]
queue = "notification-jobs"
binding = "NOTIFICATION_QUEUE"
