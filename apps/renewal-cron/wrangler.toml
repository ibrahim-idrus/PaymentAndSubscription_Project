name = "renewal-cron"
main = "src/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

[vars]
# Secrets: wrangler secret put DATABASE_URL

[triggers]
crons = ["0 * * * *"]

[[queues.producers]]
queue = "subscription-jobs"
binding = "SUBSCRIPTION_QUEUE"

[[queues.producers]]
queue = "payment-jobs"
binding = "PAYMENT_QUEUE"

[[queues.producers]]
queue = "notification-jobs"
binding = "NOTIFICATION_QUEUE"
